<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LastWar AI</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body { font-family: sans-serif; padding: 20px; }
.team { margin-top:20px; }
.red { color:red; font-weight:bold; }
</style>
</head>

<body>

<h2>LastWar 編成AI（強化版）</h2>

<input type="file" id="imageInput">
<button onclick="runOCR()">解析</button>

<div id="result"></div>

<script>
async function runOCR() {
  const file = document.getElementById("imageInput").files[0];
  if (!file) return;

  document.getElementById("result").innerText = "解析中...";

  const { data: { text } } = await Tesseract.recognize(file, 'eng');

  let lines = text.split("\n");

  let players = [];

  lines.forEach(line => {
    let match = line.match(/([A-Za-z]+)\s*(\d{2,})/);
    if (match) {
      players.push({
        name: match[1],
        power: parseInt(match[2])
      });
    }
  });

  // 戦力順
  players.sort((a,b)=>b.power-a.power);

  // チーム分け
  let A=[], B=[];
  let sumA=0, sumB=0;

  players.forEach(p=>{
    if(sumA<=sumB){ A.push(p); sumA+=p.power; }
    else{ B.push(p); sumB+=p.power; }
  });

  function formatTeam(team){
    let main = team.slice(0,20);
    let sub = team.slice(20,30);
    let overflow = team.slice(30);

    let txt = "<b>先発</b><br>";
    main.forEach(p=>txt+=`${p.name} ${p.power}<br>`);

    txt += "<br><b>交代</b><br>";
    sub.forEach(p=>txt+=`${p.name} ${p.power}<br>`);

    txt += "<br><b class='red'>溢れ</b><br>";
    overflow.forEach(p=>txt+=`<span class='red'>${p.name} ${p.power}</span><br>`);

    return txt;
  }

  let html = `
  <div class="team">
    <h3>TEAM A (${sumA})</h3>
    ${formatTeam(A)}
  </div>

  <div class="team">
    <h3>TEAM B (${sumB})</h3>
    ${formatTeam(B)}
  </div>
  `;

  document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
