<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LastWar AI</title>
</head>

<body>

<input type="file" id="imageInput">

<button onclick="testClick()">テスト</button>
<button onclick="runOCR()">OCR実行</button>

<div id="log"></div>

<!-- 🔥 ここが最重要（必ずここ） -->
<script src="https://unpkg.com/tesseract.js@5.0.4/dist/tesseract.min.js"></script>

<script>
function log(msg){
  document.getElementById("log").innerHTML += msg + "<br>";
}

function testClick(){
  alert("OK");
  log("テストOK");
}

async function runOCR(){
  alert("OCR起動");
  log("OCR開始");
}
</script>

</body>
</html>
