<body>

<h2>LastWar 編成AI（完全版）</h2>

<input type="file" id="imageInput" multiple>
<br>
<button onclick="runOCR()">解析</button>

<div id="result"></div>

<script>
async function runOCR() {
  const files = document.getElementById("imageInput").files;
  if (!files.length) return;

  document.getElementById("result").innerText = "解析中...（複数画像対応）";

  let allPlayers = [];

  for (const file of files) {
    const { data: { text } } = await Tesseract.recognize(file, 'eng+jpn', {
      tessedit_pageseg_mode: 6
    });

    let lines = text.split("\n")
      .map(l => l.trim())
      .filter(l => l.length > 0);

    lines.forEach(line => {
      // 名前 + 数値をセットで抽出
      let match = line.match(/(.+?)\s*(\d{3,})$/);
      if (!match) return;

      let name = match[1].trim();
      let power = parseInt(match[2]);

      // ノイズ除去
      if (name.length < 2) return;
      if (power < 100) return;

      allPlayers.push({ name, power });
    });
  }

  // 重複削除（名前基準）
  let unique = {};
  allPlayers.forEach(p => {
    if (!unique[p.name] || unique[p.name] < p.power) {
      unique[p.name] = p.power;
    }
  });

  let players = Object.keys(unique).map(name => ({
    name,
    power: unique[name]
  }));

  // 戦力順ソート
  players.sort((a,b)=>b.power-a.power);

  // チーム分け（バランス）

  let sumA=0, sumB=0;

      B.push(p); sumB += p.power;
    }
  });
