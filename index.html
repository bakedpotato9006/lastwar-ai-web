<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LastWar AI デバッグ完全版</title>

<style>
body { font-family: sans-serif; padding: 20px; }
button { margin-top:10px; }
#log { font-size:12px; color:gray; margin-top:10px; white-space:pre-wrap; }
</style>

</head>

<body>

<h2>LastWar AI（完全デバッグ版）</h2>

<input type="file" id="imageInput">
<br>

<button onclick="testClick()">① テスト</button>
<button onclick="runOCR()">② OCR実行</button>

<h3>状態</h3>
<div id="status">待機中</div>

<h3>ログ</h3>
<div id="log"></div>

<!-- OCRライブラリ -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<script>
function log(msg){
  console.log(msg);
  document.getElementById("log").innerHTML += msg + "\n";
}

// ① ボタン確認
function testClick(){
  alert("ボタンOK");
  log("ボタンは正常に動作しています");
}

// ② OCR
async function runOCR(){

  const file = document.getElementById("imageInput").files[0];

  if(!file){
    alert("画像を選択してください");
    return;
  }

  document.getElementById("status").innerText = "OCR開始...";
  log("OCR開始");

  try{

    const result = await Tesseract.recognize(
      file,
      'eng',
      {
        logger: m => {
          if(m.status){
            log("進行: " + m.status);
          }
        }
      }
    );

    const text = result.data.text;

    log("OCR生テキスト:\n" + text);

// 行分割
let lines = text.split("\n")
  .map(l => l.replace(/\s+/g, " "))
  .map(l => l.trim())
  .filter(l => l.length > 0);

let players = [];

lines.forEach(line => {

  let match = line.match(/(.*?)(\d{4,7})$/);
  if(!match) return;

  let name = match[1]
    .replace(/[^a-zA-Z0-9ぁ-んァ-ン一-龥]/g, "")
    .trim();

  let power = parseInt(match[2]);

  if(!name || name.length < 2) return;
  if(!power || power < 1000) return;

  players.push({ name, power });
});

log("抽出成功数: " + players.length);

players.forEach(p=>{
  log(`PLAYER: ${p.name} / ${p.power}`);
});

players.sort((a,b)=>b.power-a.power);

// チーム分け
let A=[], B=[];
let sumA=0, sumB=0;

players.forEach(p=>{
  if(sumA <= sumB){
    A.push(p);
    sumA += p.power;
  } else {
    B.push(p);
    sumB += p.power;
  }
});
</script>

</body>
</html>
