<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LastWar AI</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body { font-family: sans-serif; padding: 20px; }
.team { margin-top:20px; }
.red { color:red; font-weight:bold; }
</style>
</head>

<body>

<h2>LastWar 編成AI（実戦版）</h2>

<input type="file" id="imageInput">
<button onclick="runOCR()">解析</button>

<div id="result"></div>

<script>
async function runOCR() {
  const file = document.getElementById("imageInput").files[0];
  if (!file) return;

  document.getElementById("result").innerText = "解析中...";

  const { data: { text } } = await Tesseract.recognize(file, 'eng+jpn');

  let lines = text.split("\n").map(l => l.trim()).filter(l => l.length > 0);

  let players = [];

  lines.forEach(line => {
    // 数字（戦力）を優先抽出
    let num = line.match(/\d{3,}/);

    if (!num) return;

    let power = parseInt(num[0]);

    // 名前は数字以外
    let name = line.replace(/\d+/g, '').trim();

    // ノイズ除去
    if (name.length < 2) return;
    if (power < 100) return;

    players.push({ name, power });
  });

  // 重複削除（簡易）
  players = players.filter((v,i,a)=>
    a.findIndex(t => t.name === v.name) === i
  );

  // ソート
  players.sort((a,b)=>b.power-a.power);

  // チーム分け（強化版）
  let A=[], B=[];
  let sumA=0, sumB=0;

  players.forEach(p=>{
    if(sumA<=sumB){
      A.push(p); sumA+=p.power;
    } else {
      B.push(p); sumB+=p.power;
    }
  });

  function formatTeam(team){
    let main = team.slice(0,20);
    let sub = team.slice(20,30);
    let overflow = team.slice(30);

    let txt = "<b>先発</b><br>";
    main.forEach(p=>txt+=`${p.name} ${p.power}<br>`);

    txt += "<br><b>交代</b><br>";
    sub.forEach(p=>txt+=`${p.name} ${p.power}<br>`);

    txt += "<br><b class='red'>溢れ</b><br>";
    overflow.forEach(p=>txt+=`<span class='red'>${p.name} ${p.power}</span><br>`);

    return txt;
  }

  let html = `
  <div class="team">
    <h3>TEAM A (${sumA})</h3>
    ${formatTeam(A)}
  </div>

  <div class="team">
    <h3>TEAM B (${sumB})</h3>
    ${formatTeam(B)}
  </div>
  `;

  document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
