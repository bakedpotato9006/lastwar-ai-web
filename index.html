<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LastWar AI</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
body { font-family: sans-serif; padding: 20px; }
.red { color: red; }
</style>
</head>
<body>

<h2>LastWar 編成AI</h2>

<input type="file" id="imageInput">

<button onclick="runOCR()">解析</button>

<pre id="output"></pre>

<script>
async function runOCR() {
  const file = document.getElementById("imageInput").files[0];
  if (!file) return;

  const { data: { text } } = await Tesseract.recognize(file, 'eng');

  let lines = text.split("\n");

  let players = [];

  lines.forEach(line => {
    let match = line.match(/([A-Za-z]+)\s*(\d+)/);
    if (match) {
      players.push({
        name: match[1],
        power: parseInt(match[2])
      });
    }
  });

  players.sort((a,b)=>b.power-a.power);

  let A=[], B=[];
  let sumA=0, sumB=0;

  players.forEach(p=>{
    if(sumA<=sumB){ A.push(p); sumA+=p.power; }
    else{ B.push(p); sumB+=p.power; }
  });

  let result = "=== TEAM A ===\n";
  A.forEach(p=>result+=`${p.name} ${p.power}\n`);

  result += "\n=== TEAM B ===\n";
  B.forEach(p=>result+=`${p.name} ${p.power}\n`);

  document.getElementById("output").textContent = result;
}
</script>

</body>
</html>
